sonar.projectKey=DevOps-App
sonar.projectName=DevOps App
sonar.sourceEncoding=UTF-8

sonar.sources=app,frontend/src
sonar.tests=test,frontend/src

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/__pycache__/**,**/.venv/**,**/venv/**,**/coverage/**,**/.pytest_cache/**

sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
