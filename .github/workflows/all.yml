name: CI-CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest-cov

      - name: Run backend tests with coverage
        env:
          MONGO_URL: mongodb://localhost:27017
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  backend-build:
    needs: backend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t iot-backend ./app

  frontend-test:
    needs: backend-build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          if-no-files-found: error

  frontend-build:
    needs: frontend-test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  sonarqube:
    name: SonarQube Scan
    needs:
      - backend-test
      - frontend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: .

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  save-image:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - frontend-build
      - sonarqube

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image tag
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "Using image tag: $IMAGE_TAG"

      - name: Login to Yandex Registry
        run: |
          echo '${{ secrets.YC_SA_KEY }}' | docker login \
            --username json_key \
            --password-stdin cr.yandex

      - name: Build backend image
        run: |
          docker build \
            -t cr.yandex/crpiq93oeqf9gf5j6t0l/backend:${IMAGE_TAG} \
            -t cr.yandex/crpiq93oeqf9gf5j6t0l/backend:latest \
            ./app

      - name: Push backend image
        run: |
          docker push cr.yandex/crpiq93oeqf9gf5j6t0l/backend:${IMAGE_TAG}
          docker push cr.yandex/crpiq93oeqf9gf5j6t0l/backend:latest

      - name: Build frontend image
        run: |
          docker build \
            -t cr.yandex/crpiq93oeqf9gf5j6t0l/frontend:${IMAGE_TAG} \
            -t cr.yandex/crpiq93oeqf9gf5j6t0l/frontend:latest \
            ./frontend

      - name: Push frontend image
        run: |
          docker push cr.yandex/crpiq93oeqf9gf5j6t0l/frontend:${IMAGE_TAG}
          docker push cr.yandex/crpiq93oeqf9gf5j6t0l/frontend:latest

      - name: Update Kubernetes manifests
        run: |
          sed -i -E "s#cr.yandex/crpiq93oeqf9gf5j6t0l/backend:[^[:space:]]+#cr.yandex/crpiq93oeqf9gf5j6t0l/backend:${IMAGE_TAG}#g" k8s/*.yaml
          sed -i -E "s#cr.yandex/crpiq93oeqf9gf5j6t0l/frontend:[^[:space:]]+#cr.yandex/crpiq93oeqf9gf5j6t0l/frontend:${IMAGE_TAG}#g" k8s/*.yaml

          echo "Updated Kubernetes images:"
          grep -R "cr.yandex/crpiq93oeqf9gf5j6t0l" -n k8s

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/*.yaml

          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git commit -m "Update Kubernetes image tags to ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:master
  vk-notify:
    name: VK Notify
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - backend-build
      - frontend-test
      - frontend-build
      - sonarqube
      - save-image
    if: always()

    steps:
      - name: Define pipeline status
        id: pipeline_status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "status=FAILED" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
          elif [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "status=CANCELLED" >> "$GITHUB_OUTPUT"
            echo "emoji=⚠️" >> "$GITHUB_OUTPUT"
          elif [ "${{ contains(needs.*.result, 'skipped') }}" = "true" ]; then
            echo "status=SKIPPED" >> "$GITHUB_OUTPUT"
            echo "emoji=⚠️" >> "$GITHUB_OUTPUT"
          else
            echo "status=SUCCESS" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
          fi

      - name: Send VK notification
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          VK_PEER_IDS: ${{ secrets.VK_PEER_IDS }}
        run: |
          MESSAGE=$(cat <<EOF
          ${{ steps.pipeline_status.outputs.emoji }} CI/CD pipeline: ${{ steps.pipeline_status.outputs.status }}

          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Workflow: ${{ github.workflow }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Jobs:
          backend-test: ${{ needs.backend-test.result }}
          backend-build: ${{ needs.backend-build.result }}
          frontend-test: ${{ needs.frontend-test.result }}
          frontend-build: ${{ needs.frontend-build.result }}
          sonarqube: ${{ needs.sonarqube.result }}
          save-image: ${{ needs.save-image.result }}
          EOF
          )

          for PEER_ID in $VK_PEER_IDS; do
            echo "Sending VK notification to peer_id=$PEER_ID"

            RANDOM_ID=$(( $(date +%s) + PEER_ID % 100000 ))

            RESPONSE=$(curl -s -X POST "https://api.vk.com/method/messages.send" \
              -d "access_token=$VK_TOKEN" \
              -d "v=5.199" \
              -d "peer_id=$PEER_ID" \
              -d "random_id=$RANDOM_ID" \
              --data-urlencode "message=$MESSAGE")

            echo "$RESPONSE"

            if echo "$RESPONSE" | grep -q '"error"'; then
              echo "VK notification failed for peer_id=$PEER_ID"
              exit 1
            fi
          done
