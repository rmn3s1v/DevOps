name: Backend CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  backend-test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Run tests
        env:
          MONGO_URL: mongodb://localhost:27017
        run: pytest

  backend-build:
    needs: backend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t iot-backend ./app

  frontend-test:
    needs: backend-build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

  frontend-build:
    needs: frontend-test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  save-image:
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
    - uses: actions/checkout@v4

    - name: Login to Yandex Registry
      run: |
        echo '${{ secrets.YC_SA_KEY }}' | docker login \
          --username json_key \
          --password-stdin cr.yandex

    - name: Build image backend
      run: docker build -t cr.yandex/crpiq93oeqf9gf5j6t0l/backend:latest ./app

    - name: Push image backend
      run: docker push cr.yandex/crpiq93oeqf9gf5j6t0l/backend:latest

    - name: Build image frontend
      run: docker build -t cr.yandex/crpiq93oeqf9gf5j6t0l/frontend:latest ./frontend

    - name: Push image frontend
      run: docker push cr.yandex/crpiq93oeqf9gf5j6t0l/frontend:latest
